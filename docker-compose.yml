version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dairy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dairy_factory
      POSTGRES_USER: dairy_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-DairyFactory2024!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dairy_admin -d dairy_factory"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dairy_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dairy_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dairy_factory
      DB_USER: dairy_admin
      DB_PASSWORD: ${DB_PASSWORD:-DairyFactory2024!}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-dairy-2024}
      JWT_EXPIRES_IN: 7d
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: dairy_ai
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dairy_factory
      DB_USER: dairy_admin
      DB_PASSWORD: ${DB_PASSWORD:-DairyFactory2024!}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dairy_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
